# GitHub Action Release Workflow for KarasuWooPannel
# Version: 1.0.0
# Date: 2026-06-23

name: Release Plugin

on:
  push:
    tags:
      - 'v*' # Trigger when pushing version tags

jobs:
  build_release:
    name: Build & Release Package
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Release Zip
        run: |
          mkdir -p karasu-woo-pannel
          # Copy files while excluding development and git-related assets
          rsync -rc --exclude='.git*' --exclude='.github' --exclude='node_modules' --exclude='vendor' --exclude='.gitignore' ./ karasu-woo-pannel/
          zip -r karasu-woo-pannel.zip karasu-woo-pannel

      - name: Create GitHub Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: karasu-woo-pannel.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
